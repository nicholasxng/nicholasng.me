baseURL = "https://www.nicholasng.me"
locale = "en-us"
theme = "adritian-free-hugo-theme"

# Plugins
[params.plugins]

  # CSS Plugins
  [[params.plugins.css]]
  URL = "css/main.css"
  [[params.plugins.css]]
  URL = "css/custom.css"

  # JS Plugins
  [[params.plugins.js]]
  URL = "js/rad-animations.js"
  [[params.plugins.js]]
  URL = "js/sticky-header.js"
  [[params.plugins.js]]
  URL = "js/library/fontfaceobserver.js"


# navigation
[menu]

  [[menu.header]]
  name = "About"
  URL = "#about"
  weight = 2

  [[menu.header]]
  name = "experience"
  URL = "/experience"
  weight = 3

  [[menu.header]]
  name = "Contact"
  URL = "#contact"
  weight = 4


  [[menu.footer]]
  name = "About"
  URL = "#about"
  weight = 2

  [[menu.footer]]
  name = "experience"
  URL = "/experience"
  weight = 3

  [[menu.footer]]
  name = "Contact"
  URL = "#contact"
  weight = 4


[params]
  # Active sections only - placeholder/unused sections removed
  sections = ["showcase", "about", "education", "experience", "contact"]

  # TODO: Replace GTM-000000 with your real GTM ID, then remove the inline gtag.js in layouts/partials/head.html
  googleTagManagerID = "GTM-000000"
  homepageExperienceCount = 6
  
  [params.logo]
    text1 = "nicholas"
    text2 = ".ng"

  [params.footer]
      # TODO: Update copyright text
      copyright = "© Nicholas Ng"
