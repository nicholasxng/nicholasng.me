    <p class="lead">
        As a tech leader, I thrive on tackling complex operational challenges head-on. Whether modernizing platforms with DevOps and cloud, rolling out innovative data solutions, or launching new products, I assemble cross-functional teams to determine the objective, define the outcomes, and produce solutions.
