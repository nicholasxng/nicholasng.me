<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
    {{ partial "head.html" . }}
    {{ partial "head_custom.html" . }}
</head>
<body class="bg-background text-on-background font-body-md selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
    {{ partial "header.html" . }}

    <main class="flex-grow flex items-center justify-center pt-24 px-gutter py-section-gap">
        <div class="max-w-2xl text-center flex flex-col items-center">
            <h1 class="font-headline-xl text-headline-xl text-primary mb-4 leading-none">404</h1>
            <h2 class="font-headline-md text-headline-md mb-6">Page Not Found</h2>
            <p class="font-body-lg text-body-lg text-on-surface-variant mb-12">
                The URL you requested doesn't exist on this server. It might have been moved or deleted.
            </p>
            <a href="{{ .Site.BaseURL | absURL }}" class="bg-on-surface text-surface px-8 py-4 font-button text-button uppercase hover:bg-primary-container hover:text-on-primary-container transition-colors border-2 border-on-surface shadow-[8px_8px_0px_0px_rgba(28,27,27,1)] active:translate-x-1 active:translate-y-1 active:shadow-none">
                Back to Homepage
            </a>
        </div>
    </main>

    {{ partial "footer.html" . }} 
    {{ partial "base-foot.html" . }}
</body>
</html>
