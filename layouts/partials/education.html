<!-- Education Section (Scaled 75%) -->
<section class="pt-12 pb-6 md:pt-[6rem] md:pb-[3rem] px-gutter bg-surface-container" id="education">
    <div class="max-w-[960px] mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-[2.25rem] items-start border-t-[3px] border-on-surface pt-9">
            <div>
                <h2 class="font-headline-lg text-[2.25rem] mb-[1.125rem] leading-[1.2] tracking-tight">{{ .Site.Data.homepage.education.title | upper | default "EDUCATION" }}</h2>
            </div>
            <div class="space-y-8">
                {{ range .Site.Data.homepage.education.items }}
                <div>
                    <h3 class="font-headline-md text-[1.5rem] leading-[1.3] text-primary">{{ .university }}</h3>
                    <p class="font-body-lg text-[0.9375rem] leading-[1.6] mt-1.5">{{ .degree }}</p>
                    {{ if .year }}
                    <p class="font-label-caps text-[0.75rem] opacity-60 mt-1">{{ .year }}</p>
                    {{ end }}
                </div>
                {{ end }}
            </div>
        </div>
    </div>
</section>
