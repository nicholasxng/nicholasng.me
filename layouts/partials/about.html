<!-- About Section -->
<section class="py-section-gap px-gutter bg-on-surface text-surface" id="about">
    <div class="max-w-container-max mx-auto grid grid-cols-1 md:grid-cols-12 gap-stack-lg items-center">
        <div class="md:col-span-5">
            <h2 class="font-headline-lg text-headline-lg mb-stack-md">{{ .Site.Data.homepage.about.title | upper | default "ABOUT ME" }}</h2>
            <div class="w-16 h-1 bg-primary-container mb-stack-md"></div>
        </div>
        <div class="md:col-span-7">
            <div class="font-body-lg text-body-lg leading-relaxed opacity-90 about-content">
                {{ .Site.Data.homepage.about.content | safeHTML }}
            </div>
        </div>
    </div>
</section>

<style>
.about-content p {
    margin-bottom: 1.5rem;
}
.about-content p:last-child {
    margin-bottom: 0;
}
</style>
