<!-- Contact Section (Scaled 75%) -->
<section class="py-[6rem] px-gutter bg-surface" id="contact">
    <div class="max-w-[960px] mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-[2.25rem]">
            <div class="md:col-span-5">
                <h2 class="font-headline-lg text-[2.25rem] mb-[1.125rem] leading-[1.2] tracking-tight">{{ .Site.Data.homepage.contact.title | default "LET'S CONNECT" }}</h2>
                <p class="font-body-lg text-[0.9375rem] leading-[1.6] mb-6">Looking for a leader who can navigate the complex terrain of modern software delivery? Drop me a message.</p>
                <div class="space-y-4">
                    <a class="flex items-center gap-3 group" href="mailto:nicholas@example.com">
                        <span class="material-symbols-outlined p-3 border border-on-surface group-hover:bg-primary-container transition-colors text-[18px]">mail</span>
                        <span class="font-label-caps text-[0.656rem] tracking-[0.1em]">NICHOLAS@EXAMPLE.COM</span>
                    </a>
                    <a class="flex items-center gap-3 group" href="https://linkedin.com/in/nicholasng" target="_blank">
                        <span class="material-symbols-outlined p-3 border border-on-surface group-hover:bg-primary-container transition-colors text-[18px]">work</span>
                        <span class="font-label-caps text-[0.656rem] tracking-[0.1em]">LINKEDIN PROFILE</span>
                    </a>
                </div>
            </div>
            <div class="md:col-span-7 bg-surface p-[2.25rem] border-[1.5px] border-on-surface shadow-[6px_6px_0px_0px_rgba(28,27,27,1)]">
                <form class="space-y-[1.125rem]">
                    <div>
                        <label class="font-label-caps text-[0.656rem] uppercase block mb-1.5">FULL NAME</label>
                        <input class="w-full bg-transparent border-b-[1.5px] border-on-surface focus:border-primary transition-colors py-1.5 outline-none text-[0.75rem]" type="text"/>
                    </div>
                    <div>
                        <label class="font-label-caps text-[0.656rem] uppercase block mb-1.5">EMAIL ADDRESS</label>
                        <input class="w-full bg-transparent border-b-[1.5px] border-on-surface focus:border-primary transition-colors py-1.5 outline-none text-[0.75rem]" type="email"/>
                    </div>
                    <div>
                        <label class="font-label-caps text-[0.656rem] uppercase block mb-1.5">MESSAGE</label>
                        <textarea class="w-full bg-transparent border-b-[1.5px] border-on-surface focus:border-primary transition-colors py-1.5 outline-none resize-none text-[0.75rem]" rows="3"></textarea>
                    </div>
                    <button class="bg-on-surface text-surface w-full py-4 font-button text-[0.75rem] uppercase hover:bg-primary-container hover:text-on-primary-container transition-all flex justify-between items-center px-6 group" type="submit">
                        SEND MESSAGE
                        <span class="material-symbols-outlined group-hover:translate-x-1.5 transition-transform text-[18px]">arrow_forward</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
