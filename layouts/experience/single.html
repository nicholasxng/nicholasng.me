<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    {{ partial "head.html" . }}
    {{ partial "head_custom.html" . }}
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased pt-24 selection:bg-primary-container selection:text-on-primary-container">
    {{ partial "header.html" . }}
    
    <main class="flex-grow w-full max-w-container-max mx-auto px-gutter py-section-gap flex flex-col lg:flex-row gap-12 lg:gap-24">
        {{ partial "experience-sidebar.html" . }}
        
        <section class="w-full lg:w-2/3 flex flex-col pt-8 md:pt-0">
            <div class="prose prose-lg max-w-none 
                prose-h1:font-headline-lg prose-h1:text-headline-lg prose-h1:text-on-surface prose-h1:leading-tight prose-h1:mb-8
                prose-h3:font-headline-lg prose-h3:text-headline-lg prose-h3:text-on-surface prose-h3:leading-tight prose-h3:mb-8 prose-h3:mt-0
                prose-p:font-body-lg prose-p:text-body-lg prose-p:text-on-surface-variant prose-p:leading-relaxed prose-p:mb-6">
                {{ .Content }}
            </div>
        </section>
    </main>

    {{ partial "footer.html" . }}
    {{ partial "base-foot.html" . }}
</body>
</html>
