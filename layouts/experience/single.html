<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    {{ partial "head.html" . }}
    {{ partial "head_custom.html" . }}
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased pt-24 selection:bg-primary-container selection:text-on-primary-container">
    {{ partial "header.html" . }}
    
    <main class="flex-grow w-full max-w-container-max mx-auto px-gutter py-section-gap flex flex-col lg:flex-row gap-12 lg:gap-24">
        {{ partial "experience-sidebar.html" . }}
        
        <section class="w-full lg:w-2/3 flex flex-col pt-8 md:pt-0">
            <div class="experience-content">
                {{ .Content }}
            </div>
        </section>
    </main>

    {{ partial "footer.html" . }}
    {{ partial "base-foot.html" . }}

    <style>
        .experience-content h3:first-of-type {
            font-family: 'Epilogue', sans-serif;
            font-size: 3rem;
            line-height: 1.2;
            letter-spacing: -0.02em;
            font-weight: 800; /* Extra bold for "set apart" look */
            color: #1c1b1b;
            margin-bottom: 3rem; /* Increased spacing */
            margin-top: 0;
            display: block;
        }

        .experience-content p {
            font-family: 'Work Sans', sans-serif;
            font-size: 1.25rem;
            line-height: 1.6;
            color: #504535;
            margin-bottom: 1.5rem;
            opacity: 0.95;
        }

        @media (max-width: 768px) {
            .experience-content h3:first-of-type {
                font-size: 2.25rem;
                margin-bottom: 2rem;
            }
        }
    </style>
</body>
</html>
